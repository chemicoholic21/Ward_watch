version: '3.8'

# Local dev stack. You only need ONE database — pick either:
#   docker-compose up -d elasticsearch kibana web      (current code, uses ES)
#   docker-compose up -d mongo mongo-express web       (after the ES->Mongo swap)
#
# - elasticsearch / kibana: current backend (default; required until ES->Mongo
#   migration ships)
# - mongo / mongo-express: ready for when the code is migrated. mongo-express
#   is a web UI at http://localhost:8081 (admin/pass).
# - web: the Next.js app (frontend + API routes)

services:
  mongo:
    image: mongo:7.0
    container_name: ghostoffice-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo-express:
    image: mongo-express:1.0.2
    container_name: ghostoffice-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pass
    depends_on:
      mongo:
        condition: service_healthy

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: ghostoffice-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: ghostoffice-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  web:
    image: node:20-alpine
    container_name: ghostoffice-web
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - ES_NODE=http://elasticsearch:9200
      - NEXT_PUBLIC_API_URL=
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  es_data:
    driver: local
  mongo_data:
    driver: local

networks:
  default:
    name: ghostoffice-network
