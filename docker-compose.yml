version: '3.8'

# Single-service stack now that the app is a unified Next.js project.
# - elasticsearch: data store (use Elastic Cloud / OpenSearch / Atlas for prod)
# - kibana: optional dev UI for ES
# - web: the Next.js app (frontend + API routes, replaces the old `frontend` +
#        `backend` services)

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: ghostoffice-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: ghostoffice-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  web:
    image: node:20-alpine
    container_name: ghostoffice-web
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - ES_NODE=http://elasticsearch:9200
      - NEXT_PUBLIC_API_URL=
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  es_data:
    driver: local

networks:
  default:
    name: ghostoffice-network
