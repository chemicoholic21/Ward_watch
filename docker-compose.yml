version: '3.8'

# Local dev stack. Just MongoDB now — Elasticsearch is gone.
#
#   docker-compose up -d                       # mongo + mongo-express + web
#   docker-compose up -d mongo mongo-express   # just the database + UI
#
# mongo-express is the web UI at http://localhost:8081 (admin/pass).

services:
  mongo:
    image: mongo:7.0
    container_name: wardwatch-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo-express:
    image: mongo-express:1.0.2
    container_name: wardwatch-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pass
    depends_on:
      mongo:
        condition: service_healthy

  web:
    image: node:20-alpine
    container_name: wardwatch-web
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=wardwatch
      - NEXT_PUBLIC_API_URL=
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  mongo_data:
    driver: local

networks:
  default:
    name: wardwatch-network
